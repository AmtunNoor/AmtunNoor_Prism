name: Compile Android TV APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Android App
        uses: actions/checkout@v4

      - name: Checkout latest Quran web app
        uses: actions/checkout@v4
        with:
          repository: AmtunNoor/Quran
          ref: main
          path: quran-web

      - name: Bundle Quran web app into Android assets
        run: |
          rm -rf app/src/main/assets/prism
          mkdir -p app/src/main/assets/prism
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README*' \
            --exclude='*.apk' \
            --exclude='listen/*.mp3' \
            --exclude='learn/*.mp3' \
            --exclude='names/*.mp3' \
            quran-web/ app/src/main/assets/prism/

          echo "VERIFY BUNDLED PRISM:"
          ls -la app/src/main/assets/prism
          echo "VERIFY PLUGINS:"
          ls -la app/src/main/assets/prism/plugins || true
          echo "VERIFY STYLES:"
          ls -la app/src/main/assets/prism/styles || true
          echo "VERIFY ENGINES:"
          ls -la app/src/main/assets/prism/engines || true

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle Environment
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Save and Provide APK
        uses: actions/upload-artifact@v4
        with:
          name: NoorPrism-Build
          path: app/build/outputs/apk/release/app-release.apk
