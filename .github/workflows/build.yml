name: Build Noor Prism Android Runtime

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Android-only runtime architecture
        shell: bash
        run: |
          set -euo pipefail
          test ! -d app/src/main/assets
          test -f app/src/main/java/com/noor/prism/MainActivity.kt
          test -f app/src/main/java/com/noor/prism/PlaybackKeepAliveService.kt
          ! grep -R "requestedOrientation" app/src/main/java
          ! grep -R "shouldInterceptRequest" app/src/main/java
          ! grep -R "__prismEnsureTopbar\|__prismHealTopbar" app/src/main/java

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Lint and compile release
        run: gradle clean lintRelease testReleaseUnitTest assembleRelease --stacktrace

      - name: Verify installable APK exists
        shell: bash
        run: |
          set -euo pipefail
          test -s app/build/outputs/apk/release/app-release.apk
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Upload validated APK and lint report
        uses: actions/upload-artifact@v4
        with:
          name: NoorPrism-Runtime-v2.4.0-APK
          if-no-files-found: error
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/reports/lint-results-release.html
